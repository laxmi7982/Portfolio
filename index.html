<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laxmi Chaudhary — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero" id="hero">
    <div class="glow-blob" id="blob"></div>
    <div class="glow-inner" id="inner"></div>
    <div class="cursor-dot" id="dot"></div>

    <div class="content">
      <div class="name-label">Laxmi Chaudhary</div>
      <div class="portfolio-word">P<span class="italic-part">ortfoli</span>o</div>
      <div class="role-label">Graphic Designer &nbsp;&amp;&nbsp; UI/UX Designer</div>
    </div>
  </section>

  <script>
    const hero = document.getElementById('hero');
    const blob = document.getElementById('blob');
    const inner = document.getElementById('inner');
    const dot = document.getElementById('dot');

    let mx = 0, my = 0;
    let bx = 0, by = 0;
    let ix = 0, iy = 0;
    let started = false;

    hero.addEventListener('mousemove', e => {
      const r = hero.getBoundingClientRect();
      mx = e.clientX - r.left;
      my = e.clientY - r.top;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
      if (!started) {
        bx = mx; by = my;
        ix = mx; iy = my;
        started = true;
      }
    });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      if (started) {
        bx = lerp(bx, mx, 0.06);
        by = lerp(by, my, 0.06);
        ix = lerp(ix, mx, 0.12);
        iy = lerp(iy, my, 0.12);
        blob.style.left = bx + 'px';
        blob.style.top = by + 'px';
        inner.style.left = ix + 'px';
        inner.style.top = iy + 'px';
      }
      requestAnimationFrame(tick);
    }

    tick();
  </script>

</body>
</html>
