<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovHub Project</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#ffffff;
  color:#0084ff;
  font-family:Arial, sans-serif;
  opacity:1;
  transition:opacity .4s ease;
}

.hero{
  padding:60px 40px 20px;
  text-align:center;
}

.hero h1{
  font-size:60px;
  margin-bottom:20px;
}

.hero p{
  color:#999;
  font-size:18px;
}

/* ===== SINGLE CENTERED IMAGE ===== */
.showcase{
  padding:40px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.img-box{
  width:100%;
  max-width:1000px;
  border-radius:16px;
  overflow:hidden;
  opacity:0;
  transform:translateY(60px);
  animation:slideUp .8s ease forwards;
  background:#111;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.img-box img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  transition: transform .4s ease;
}

.img-box:hover img{
  transform: scale(1.05);
}

@keyframes slideUp{
  from{ opacity:0; transform:translateY(60px); }
  to{ opacity:1; transform:translateY(0); }
}

@media (max-width: 600px){
  .img-box{ max-width:100%; }
}

/* ===== BACK BUTTON - z-index high, gallery ke upar fixed ===== */
.back-btn-wrap{
  position:fixed;
  top:20px;
  left:20px;
  z-index:999;
}

button{
  position: relative;
  padding: 15px 45px;
  background: #077ece;
  font-size: 17px;
  font-weight: 500;
  color: #181818;
  cursor: pointer;
  border: 1px solid #2b8dcf;
  border-radius: 8px;
  filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.2));
}
button:hover {
  border: 1px solid #95d4fe;
  background: linear-gradient(85deg, #8bcefc, #95d4fe, #6fc0f7, #95d4fe, #95d4fe);
  animation: wind 2s ease-in-out infinite;
}
@keyframes wind {
  0% { background-position: 0% 50%; }
  50% { background-position: 50% 100%; }
  100% { background-position: 0% 50%; }
}
.icon-1 {
  position: absolute; top: 0; right: 0; width: 25px;
  transform-origin: 0 0; transform: rotate(10deg);
  transition: all 0.5s ease-in-out;
  filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.3));
}
button:hover .icon-1 { animation: slay-1 3s cubic-bezier(0.52, 0, 0.58, 1) infinite; transform: rotate(10deg); }
@keyframes slay-1 { 0% { transform: rotate(10deg); } 50% { transform: rotate(-5deg); } 100% { transform: rotate(10deg); } }

.icon-2 {
  position: absolute; top: 0; left: 25px; width: 12px;
  transform-origin: 50% 0; transform: rotate(10deg);
  transition: all 1s ease-in-out;
  filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.5));
}
button:hover .icon-2 { animation: slay-2 3s cubic-bezier(0.52, 0, 0.58, 1) 1s infinite; transform: rotate(0); }
@keyframes slay-2 { 0% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } 100% { transform: rotate(0); } }

.icon-3 {
  position: absolute; top: 0; left: 0; width: 18px;
  transform-origin: 50% 0; transform: rotate(-5deg);
  transition: all 1s ease-in-out;
  filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.5));
}
button:hover .icon-3 { animation: slay-3 2s cubic-bezier(0.52, 0, 0.58, 1) 1s infinite; transform: rotate(0); }
@keyframes slay-3 { 0% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
</style>

</head>
